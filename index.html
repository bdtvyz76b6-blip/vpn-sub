<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦅 Орёл VPN</title>

  <meta name="description" content="Быстрый, безопасный и современный VPN.">

  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="favicon.svg">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 14px 18px;
      width: 240px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
    }

    .connect {
      background: #1e90ff;
      color: white;
    }

    .copy {
      background: #2ecc71;
      color: white;
    }

    .card {
      background: #1a1a2e;
      margin: 10px auto;
      padding: 15px;
      border-radius: 12px;
      width: 260px;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 10px 16px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<header>🦅 Орёл VPN</header>

<h2>Безопасный VPN нового поколения</h2>

<!-- КНОПКИ -->
<button class="btn connect" onclick="connectVPN()">
  🔐 Подключиться
</button>

<button class="btn copy" onclick="copySub()">
  📋 Скопировать подписку
</button>

<!-- СЕРВЕРЫ -->
<div class="card">🇺🇸 США</div>
<div class="card">📶 Мобильный интернет</div>
<div class="card">🇨🇳 Азия</div>

<div id="toast"></div>

<script>
const SUB = "https://raw.githubusercontent.com/bdtvyz76b6-blip/vpn-sub/main/sub.txt";
const APP = "itms-apps://apps.apple.com/app/id6504287215";

// подключение
function connectVPN() {
  navigator.clipboard.writeText(SUB);
  showToast("Подключение...");

  setTimeout(() => {
    window.location.href = APP;
  }, 800);
}

// копирование
function copySub() {
  navigator.clipboard.writeText(SUB).then(() => {
    showToast("Ссылка скопирована 📋");
  });
}

// toast
function showToast(text) {
  const t = document.getElementById("toast");
  t.innerText = text;
  t.style.display = "block";

  setTimeout(() => {
    t.style.display = "none";
  }, 2000);
}
</script>

</body>
</html>
