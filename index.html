<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦅 Орёл VPN</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b14;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: #0b0b14;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #1e90ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .fade {
      opacity: 0;
      transition: 0.5s;
    }

    header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .btn {
      display: block;
      margin: 10px auto;
      width: 260px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .connect {
      background: #1e90ff;
      color: white;
    }

    .copy {
      background: #2ecc71;
      color: white;
    }

    .server {
      background: #1a1a2e;
      margin: 10px auto;
      width: 260px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .server:hover {
      transform: scale(1.03);
    }

    .active {
      border: 2px solid #1e90ff;
    }

    /* CONNECTING ANIMATION */
    #connecting {
      display: none;
      margin-top: 20px;
    }

    .bar {
      width: 200px;
      height: 6px;
      background: #222;
      margin: 10px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: #1e90ff;
      animation: load 2s forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 10px 16px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p style="margin-top:15px;">Орёл VPN запускается...</p>
</div>

<header>🦅 Орёл VPN</header>

<div class="status" id="status">Статус: не подключено</div>

<button class="btn connect" onclick="connect()">
  🔐 Подключиться
</button>

<button class="btn copy" onclick="copySub()">
  📋 Скопировать подписку
</button>

<div id="connecting">
  <p>Подключение...</p>
  <div class="bar">
    <div class="progress"></div>
  </div>
</div>

<!-- СЕРВЕРЫ -->
<div class="server active" onclick="selectServer(this,'US')">🇺🇸 США</div>
<div class="server" onclick="selectServer(this,'MOBILE')">📶 Мобильный интернет</div>
<div class="server" onclick="selectServer(this,'FIN')">🇫🇮 Финляндия</div>

<div id="toast"></div>

<script>
const SUB = "https://raw.githubusercontent.com/bdtvyz76b6-blip/vpn-sub/main/sub.txt";

let current = "US";
let connected = false;

/* CONNECT */
function connect() {
  document.getElementById("connecting").style.display = "block";

  setTimeout(() => {
    connected = true;
    document.getElementById("status").innerText = "Статус: подключено 🟢";
    showToast("VPN подключен");
  }, 2200);
}

/* COPY */
function copySub() {
  navigator.clipboard.writeText(SUB);
  showToast("Ссылка скопирована");
}

/* SERVER */
function selectServer(el, key) {
  document.querySelectorAll(".server").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
  current = key;
  showToast("Сервер: " + key);
}

/* TOAST */
function showToast(t) {
  const el = document.getElementById("toast");
  el.innerText = t;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 2000);
}

/* LOADER */
window.addEventListener("load", () => {
  const l = document.getElementById("loader");
  l.classList.add("fade");
  setTimeout(() => l.style.display = "none", 500);
});
</script>

</body>
</html>
